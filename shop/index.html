<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanteen's shopping page</title>
</head>
<body>
    <header>
          <header role="banner" aria-label="Kanteen header">
        <h1 class="header__title">Kanteen</h1>
    </header>

    <nav role="navigation" aria-label="Primary">
        <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span class="nav__toggle-icon">≡</span>
        </button>
        <div class="nav-list">
            <a class="nav__link" href="#shop">Shop</a>
            <a class="nav__link" href="#menu">Menu</a>
            <a class="nav__link" href="#our-story">Our Story</a>
        </div>

        <div class="nav-icons">
            <button class="nav__login" type="button">Login</button>
            <a class="social-icons__facebook" href="https://web.facebook.com/kanteenrestaurant" target="_blank"
                rel="noopener noreferrer" aria-label="Kanteen on Facebook">
                <img src="https://cdn.simpleicons.org/facebook" width="24" height="24" alt="Kanteen on Facebook">
            </a>
            <a class="social-icons__instagram" href="https://www.instagram.com/kanteen_/?hl=en" target="_blank"
                rel="noopener noreferrer" aria-label="Kanteen on Instagram">
                <img src="https://cdn.simpleicons.org/instagram" width="24" height="24" alt="Kanteen on Instagram">
            </a>
        </div>
    </nav>
    </header>
</body>
</html>
